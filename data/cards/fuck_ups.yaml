# ============================================================
# TECHNOLOGY CARDS
# ============================================================
# Each card has:
#   name        - Display name
#   cost        - Resource cost to play
#   tag         - Category tag (e.g. energy, computing, biotech)
#   description - What the card does
#   production  - Resources this card generates per turn (generation)
#   effect      - Special effect when played (optional)
# ============================================================

- name: Solar Farm
  cost: 4
  tag: energy
  description: A large-scale solar energy installation.
  production:
    energy: 2
  effect: null

- name: Quantum Processor
  cost: 8
  tag: computing
  description: Bleeding-edge quantum computing hardware.
  production:
    data: 3
  effect: null

- name: Bioreactor
  cost: 6
  tag: biotech
  description: Genetically engineered organisms producing raw materials.
  production:
    materials: 2
  effect: null

