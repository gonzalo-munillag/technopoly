# ============================================================
# REGULATION CARDS
# ============================================================
# One drawn per year. Affects players based on 'targets'.
#
#   name            - Regulation name
#   cost            - 0 (automatic)
#   tag             - Category
#   description     - What the regulation does
#   targets         - "all" or a card_type (e.g. "platform", "cyber_attack")
#   penalty         - Resource changes if player accepts (negative = loss)
#   court_penalty   - Harsher penalty if player loses in court
#   court_threshold - Roll >= this on d6 to win court (e.g. 4 means 4,5,6 win)
# ============================================================

- name: Data Privacy Act
  cost: 0
  tag: privacy
  description: Companies handling user data must comply with strict rules or face fines.
  targets: platform
  penalty:
    money: -5
  court_penalty:
    money: -10
    reputation: -2
  court_threshold: 4

- name: Anti-Monopoly Ruling
  cost: 0
  tag: antitrust
  description: Large companies are fined for anti-competitive practices.
  targets: all
  penalty:
    money: -3
  court_penalty:
    money: -8
    reputation: -3
  court_threshold: 4

